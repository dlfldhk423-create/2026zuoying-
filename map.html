<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>見證架地點 - 2026年高雄國際大會</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0f172a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: sans-serif;
            padding-bottom: 80px; /* Space for the floating button */
        }
        .header-bar {
            background: rgba(30, 41, 59, 0.95);
            width: 100%;
            padding: 1rem;
            box-sizing: border-box;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .btn-back {
            display: inline-block;
            background: #4f46e5;
            color: #fff;
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .btn-back:hover {
            background: #4338ca;
        }
        .map-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            box-sizing: border-box;
        }
        .map-image {
            max-width: 100%;
            height: auto;
            display: block;
            border-radius: 8px;
        }
        .floating-btn {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(30, 41, 59, 0.95);
            border: 2px solid rgba(255,255,255,0.2);
            color: #fff;
            padding: 1rem 2rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 1.1rem;
            font-weight: bold;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 20;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
    </style>
</head>
<body>
    <div class="header-bar">
        <a href="index.html" class="btn-back">⬅ 返回首頁 (Back to Home)</a>
    </div>
    
    <div class="map-container">
        <!-- 移除連結，讓使用者可以自由用兩指放大縮小圖片 -->
        <img src="map.jpg" alt="手拉車見證架地點" class="map-image">
    </div>

    <a href="index.html" class="floating-btn">⬅ 返回首頁</a>
</body>
</html>
